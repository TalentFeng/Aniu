services:
  postgres:
    image: postgres:16-alpine
    container_name: aniu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aniu}
      POSTGRES_USER: ${POSTGRES_USER:-aniu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aniu}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-aniu} -d $${POSTGRES_DB:-aniu}"]
      interval: 10s
      timeout: 5s
      retries: 5

  aniu:
    image: ghcr.io/anacondakc/aniu:${ANIU_IMAGE_TAG:-latest}
    container_name: aniu
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://aniu:aniu@postgres:5432/aniu}
    volumes:
      - ./data:/app/data

volumes:
  pgdata:
